<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page not found — IKI Systems</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#faf7f0" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#131418" media="(prefers-color-scheme: dark)" />
  <style>
    :root {
      --bg: #faf7f0;
      --text: #2b2620;
      --text-dim: #6b6056;
      --accent: #9a5b34;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #131418;
        --text: #f1efe9;
        --text-dim: #a8a399;
        --accent: #f3b54a;
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.65;
      color: var(--text);
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    img { width: 56px; height: 56px; margin-bottom: 1.5rem; }
    h1 { font-size: 2rem; font-weight: 600; letter-spacing: -0.01em; }
    p { color: var(--text-dim); margin-top: 0.5rem; }
    a { color: var(--accent); text-decoration: none; margin-top: 1.5rem; display: inline-block; }
    a:hover { text-decoration: underline; }
    a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 6px; }
  </style>
</head>
<body>
  <img src="brand-icon.svg" alt="" width="56" height="56" />
  <h1>Page not found</h1>
  <p>The page you were looking for doesn&rsquo;t exist.</p>
  <a href="/">&larr; Back to IKI Systems</a>
</body>
</html>
